name: chemix
description: MVP app de aprendizaje de química
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  go_router: ^14.2.7

  shared_preferences: ^2.3.2
  sqflite: ^2.3.3+1
  path: ^1.9.0

  in_app_purchase: ^3.2.0
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/elements.json
    - assets/branding/logo.png
